name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      OTP_VERSION: "28.3"
      ELIXIR_VERSION: "1.19.5"
    steps:
      - uses: actions/checkout@v4

      # Puts cl.exe and nmake.exe on PATH so elixir_make can drive the
      # MSVC toolchain via examples/adaptive_fold/Makefile.win.
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}
          version-type: strict

      - name: Cache mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            examples/adaptive_fold/deps
            examples/adaptive_fold/_build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('examples/adaptive_fold/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Compile yieldwise (root)
        run: mix compile --warnings-as-errors

      - name: Fetch example deps
        working-directory: examples/adaptive_fold
        run: mix deps.get

      - name: Compile example
        working-directory: examples/adaptive_fold
        run: mix compile --warnings-as-errors

      - name: Test example
        working-directory: examples/adaptive_fold
        run: mix test
